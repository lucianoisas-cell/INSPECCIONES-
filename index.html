<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Flota</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 p-4">

    <!-- Formulario y Contenido aquí -->
    <form id="inspectionForm" class="bg-white p-6 rounded-lg shadow-md max-w-lg mx-auto">
        <!-- Contenido del formulario (Campos de entrada) -->
        <h2 class="text-xl font-bold mb-4">Inspección de Unidad</h2>
        <!-- ... resto de tus campos ... -->
        
        <button type="button" onclick="submitForm('Aprobado')" class="bg-green-500 text-white p-2 rounded">Aprobar</button>
        <button type="button" onclick="submitForm('Suspendido')" class="bg-red-500 text-white p-2 rounded">Suspender</button>
    </form>

    <!-- Tabla Historial -->
    <table class="w-full mt-6 bg-white rounded-lg overflow-hidden">
        <tbody id="inspections-tbody"></tbody>
    </table>

    <!-- Notificaciones -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-800 text-white px-4 py-2 rounded shadow-lg transition-transform translate-y-20 opacity-0"></div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwSF-c6dBhaWgKf2tGWSOglJRa6-8C2A0L1WZoeUKk4de-dGHYPGHIqdVZUZVXipppC_w/exec";
        
        const dictComponentes = {
            motor: "MOTOR",
            frenos: "FRENOS",
            luces_del: "LUCES DELANTERAS",
            luces_tras: "LUCES TRASERAS",
            limpieza: "LIMPIEZA",
            levantacristales: "LEVANTACRISTALES",
            cerraduras: "CERRADURAS DE PUERTAS"
        };

        // Lógica de procesado
        async function submitForm(estadoResultado) {
            const form = document.getElementById('inspectionForm');
            if (!form.reportValidity()) {
                showToast("⚠️ Completa los campos.");
                return;
            }

            const formData = new FormData(form);
            let fallasAuto = [];
            let faltantesDoc = [];

            // Procesar datos
            for (let [key, val] of formData.entries()) {
                if (key.startsWith('excl_') && val === 'NO') {
                    let id = key.replace('excl_', '');
                    if (dictComponentes[id]) faltantesDoc.push(dictComponentes[id]);
                }
                if (key.startsWith('est_') && (val === 'REGULAR' || val === 'MALO')) {
                    let id = key.replace('est_', '');
                    if (dictComponentes[id]) fallasAuto.push(`${dictComponentes[id]}: ${val}`);
                }
            }

            const payload = Object.fromEntries(formData);
            payload.resultado_final = estadoResultado;

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                showToast("✅ Guardado correctamente");
                fetchSheetsData();
            } catch (error) {
                showToast("❌ Error al guardar");
            }
        }

        async function fetchSheetsData() {
            const tbody = document.getElementById('inspections-tbody');
            try {
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=read`);
                const data = await res.json();
                tbody.innerHTML = "";
                data.forEach((row, index) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="p-2 border">${row.fecha || '-'}</td><td class="p-2 border">${row.patente || '-'}</td><td class="p-2 border">${row.resultado_final || '-'}</td>`;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error("Error cargando historial");
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // Cargar historial al iniciar
        fetchSheetsData();
    </script>
</body>
</html>
